name: 'stockmesh'
version: '1.0.0'
config-version: 2

profile: 'stockmesh'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  stockmesh:
    prices:
      +schema: DBT_DEV
      +materialized: table
    fundamentals:
      +schema: DBT_DEV
      +materialized: table
    news:
      +schema: DBT_DEV
      +materialized: table
    cross_domain:
      +schema: DBT_DEV
      +materialized: table
